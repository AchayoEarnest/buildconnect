upstream django_api { server api:8000; }
upstream nextjs_app { server web:3000; }

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buildconnect.com www.buildconnect.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Static files served by Nginx directly
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket connections
    location /ws/ {
        proxy_pass http://django_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Django REST API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://django_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/login/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://django_api;
    }

    location /admin/ {
        proxy_pass http://django_api;
        proxy_set_header Host $host;
    }

    location /api/schema/ { proxy_pass http://django_api; }
    location /api/docs/   { proxy_pass http://django_api; }

    # Stripe webhook - no rate limit
    location /api/webhooks/ {
        proxy_pass http://django_api;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
